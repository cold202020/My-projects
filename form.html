<!DOCTYPE html>
<html>
<head>
     <link rel="stylesheet" href="style.css">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
     <nav class="navbar">
        <ul>
            <li><a href="Home.html">Back to home</a></li>
        </ul>
    </nav>
    <h1> Put your innformation here </h1>
    <form class="form">
        <label for="fname">First name:</label>
        <input type="text" id="fname" placeholder="your name">
        <br>
        <br>
        <label for="lname">Last name:</label>
        <input type="text" id="lname" placeholder="your father name">
        <br>
        <br>
        <label for="mail">Email:</label>
        <input type="email" id="mail" placeholder="your email acount">
        <br>
        <br>
        <label for="phone">Phone number:</label>
        <input type="tel" id="phone" placeholder="your  telephone number">
        <br>
        <br>
        <label for="age">Your birth day:</label>
        <input type="date" id="age">
        <br>
        <br>
        <label>Write about yourself:</label>
        <br>
        <textarea rows="5" cols="20" placeholder="write it here"></textarea>
        <br>
        <br>
        <label>What do you do for living:</label>
        <select id="payment">
            <option>student</option>
            <option>worker</option>
            <option>officer</option>
        </select>
        <br>
        <br>
        <input type="reset" id="reset">
        <br>
        <br>
        <input type="submit" id="submit">
    </form>
</body>
 

</html>
